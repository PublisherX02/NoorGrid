name: NoorGrid CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Type, Test & Coverage
    runs-on: ubuntu-latest

    env:
      # Test environment — backend not running in CI; unit tests do not require it.
      # Override with a real URL in the repo secret for future integration tests.
      BACKEND_URL: ${{ secrets.BACKEND_URL || 'http://localhost:8000' }}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy backend frontend

      - name: Run tests with coverage gate
        run: pytest tests/ -v --tb=short --cov=backend --cov=frontend --cov-report=term-missing --cov-fail-under=80

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030303"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(3,3,3,0.98)"/>
      <stop offset="100%" style="stop-color:rgba(10,10,10,0.85)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="83" x2="900" y2="83"/>
    <line x1="0" y1="166" x2="900" y2="166"/>
    <line x1="0" y1="249" x2="900" y2="249"/>
    <line x1="0" y1="332" x2="900" y2="332"/>
    <line x1="0" y1="415" x2="900" y2="415"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Glow dots (simulated 3D globe points) -->
  <g filter="url(#glow)">
    <circle cx="620" cy="200" r="3" fill="#06b6d4" opacity="0.9"/>
    <circle cx="680" cy="160" r="2.5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="720" cy="220" r="2" fill="#fbbf24" opacity="0.9"/>
    <circle cx="750" cy="180" r="3" fill="#06b6d4" opacity="0.7"/>
    <circle cx="640" cy="250" r="2" fill="#06b6d4" opacity="0.6"/>
    <circle cx="700" cy="290" r="2.5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="780" cy="240" r="2" fill="#06b6d4" opacity="0.7"/>
    <circle cx="820" cy="200" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="660" cy="130" r="2" fill="#06b6d4" opacity="0.6"/>
    <circle cx="800" cy="150" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="850" cy="280" r="2" fill="#06b6d4" opacity="0.5"/>
    <circle cx="590" cy="170" r="1.5" fill="#06b6d4" opacity="0.6"/>
    <circle cx="760" cy="320" r="2" fill="#06b6d4" opacity="0.4"/>
    <circle cx="700" cy="350" r="1.5" fill="#fbbf24" opacity="0.5"/>
  </g>

  <!-- Connecting lines (globe mesh) -->
  <g stroke="#06b6d4" stroke-width="0.5" opacity="0.15">
    <line x1="620" y1="200" x2="680" y2="160"/>
    <line x1="680" y1="160" x2="750" y2="180"/>
    <line x1="750" y1="180" x2="720" y2="220"/>
    <line x1="720" y1="220" x2="640" y2="250"/>
    <line x1="620" y1="200" x2="640" y2="250"/>
    <line x1="720" y1="220" x2="780" y2="240"/>
    <line x1="750" y1="180" x2="800" y2="150"/>
    <line x1="800" y1="150" x2="820" y2="200"/>
    <line x1="820" y1="200" x2="780" y2="240"/>
    <line x1="700" y1="290" x2="780" y2="240"/>
    <line x1="700" y1="290" x2="640" y2="250"/>
    <line x1="700" y1="290" x2="760" y2="320"/>
  </g>

  <!-- Left story panel -->
  <rect x="0" y="0" width="480" height="500" fill="#030303" opacity="0.96"/>
  <line x1="480" y1="0" x2="480" y2="500" stroke="#06b6d4" stroke-width="1" opacity="0.25"/>
  <!-- Panel glow shadow on right edge -->
  <rect x="470" y="0" width="30" height="500" fill="#06b6d4" opacity="0.02"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="480" height="3" fill="#06b6d4" opacity="0.8"/>

  <!-- NOORGRID logo / title -->
  <text x="36" y="64" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="6" filter="url(#glow)">NOORGRID</text>
  <text x="36" y="88" font-family="monospace" font-size="11" fill="#06b6d4" letter-spacing="2" opacity="0.9">TUNISIA'S MISSING ENERGY INTELLIGENCE</text>

  <!-- Divider -->
  <line x1="36" y1="104" x2="444" y2="104" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>

  <!-- Chapter heading -->
  <text x="36" y="132" font-family="monospace" font-size="9" fill="#fbbf24" letter-spacing="3" opacity="0.8">CHAPTER 01 · THE CRISIS</text>

  <!-- Main body text block -->
  <text x="36" y="162" font-family="Georgia, serif" font-size="18" fill="#ffffff" font-weight="400">August 14, 2024 — 15:41</text>
  <text x="36" y="186" font-family="Georgia, serif" font-size="14" fill="#d1d5db" opacity="0.9">Tunisia's grid hit</text>
  <text x="36" y="210" font-family="Georgia, serif" font-size="22" fill="#fbbf24" font-weight="700" filter="url(#glow)">4,888 MW demand</text>
  <text x="36" y="234" font-family="Georgia, serif" font-size="14" fill="#d1d5db" opacity="0.9">against effective capacity of</text>
  <text x="36" y="258" font-family="Georgia, serif" font-size="22" fill="#06b6d4" font-weight="700" filter="url(#glow)">4,636 MW</text>
  <text x="36" y="282" font-family="Georgia, serif" font-size="14" fill="#d1d5db" opacity="0.9">The grid was over capacity.</text>
  <text x="36" y="306" font-family="Georgia, serif" font-size="14" fill="#d1d5db" opacity="0.9">Algeria covered the 252 MW gap.</text>

  <!-- Divider -->
  <line x1="36" y1="326" x2="444" y2="326" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>

  <!-- Status indicators -->
  <rect x="36" y="342" width="8" height="8" rx="1" fill="#ef4444"/>
  <text x="52" y="351" font-family="monospace" font-size="11" fill="#ef4444">CRITICAL — HEADROOM −5.4%</text>

  <rect x="36" y="364" width="8" height="8" rx="1" fill="#fbbf24"/>
  <text x="52" y="373" font-family="monospace" font-size="11" fill="#fbbf24">BLACKOUT PREDICTION ENGINE ACTIVE</text>

  <rect x="36" y="386" width="8" height="8" rx="1" fill="#06b6d4"/>
  <text x="52" y="395" font-family="monospace" font-size="11" fill="#06b6d4">DIGITAL TWIN · 5 REGIONS MONITORED</text>

  <!-- Bottom tag -->
  <text x="36" y="460" font-family="monospace" font-size="10" fill="#4b5563" opacity="0.7">INTERACTIVE PRESENTATION</text>
  <text x="36" y="478" font-family="monospace" font-size="10" fill="#06b6d4" opacity="0.9">▶  Click to launch full presentation →</text>

  <!-- Right side: map markers -->
  <g filter="url(#glowStrong)">
    <!-- Tunisia regions markers -->
    <circle cx="672" cy="195" r="6" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9"/>
    <circle cx="672" cy="195" r="2" fill="#fbbf24" opacity="1"/>
    <text x="682" y="192" font-family="monospace" font-size="8" fill="#fbbf24" opacity="0.9">Bizerte · 97MW</text>

    <circle cx="690" cy="218" r="5" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <circle cx="690" cy="218" r="2" fill="#06b6d4" opacity="1"/>
    <text x="700" y="215" font-family="monospace" font-size="8" fill="#06b6d4" opacity="0.9">Nabeul · 55MW</text>

    <circle cx="700" cy="270" r="5" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <circle cx="700" cy="270" r="2" fill="#fbbf24" opacity="1"/>
    <text x="710" y="267" font-family="monospace" font-size="8" fill="#fbbf24" opacity="0.8">Tozeur · 20MW</text>

    <circle cx="660" cy="230" r="5" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
    <circle cx="660" cy="230" r="2" fill="#34d399" opacity="1"/>
    <text x="670" y="227" font-family="monospace" font-size="8" fill="#34d399" opacity="0.8">Béja · 33MW</text>

    <circle cx="720" cy="295" r="5" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <circle cx="720" cy="295" r="2" fill="#fbbf24" opacity="1"/>
    <text x="730" y="292" font-family="monospace" font-size="8" fill="#fbbf24" opacity="0.8">Sidi Bouzid · 100MW</text>
  </g>

  <!-- "LIVE" badge top right -->
  <rect x="820" y="18" width="54" height="20" rx="3" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <circle cx="830" cy="28" r="3" fill="#ef4444" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="838" y="32" font-family="monospace" font-size="10" fill="#ef4444" font-weight="700">LIVE</text>

  <!-- Bottom border -->
  <rect x="0" y="497" width="900" height="3" fill="#06b6d4" opacity="0.4"/>
</svg>

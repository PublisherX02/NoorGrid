                const heightScale = 0.03;
                if(chartBars[0]) {

        function buildLayeredNetwork() {
            const group = new THREE.Group();
            group.position.set(80, 0, -80); 

            const levels = [
                { y: 15, count: 10, color: 0x22c55e, radius: 10 }, 
                { y: 5,  count: 8,  color: 0x3b82f6, radius: 8 },  
                { y: -5, count: 6,  color: 0xa855f7, radius: 6 },  
                { y: -15, count: 4, color: 0xf97316, radius: 4 }   
            ];

            const nodesByLevel = [];

            levels.forEach((levelData) => {
                const levelNodes = [];
                const nodeMat = new THREE.MeshBasicMaterial({color: levelData.color});
                for(let i=0; i<levelData.count; i++) {
                    const node = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), nodeMat);
                    const angle = (i / levelData.count) * Math.PI * 2;
                    const r = levelData.radius + (Math.random()-0.5)*2;
                    node.position.set(Math.cos(angle)*r, levelData.y, Math.sin(angle)*r);
                    group.add(node);
                    levelNodes.push(node);
                }
                nodesByLevel.push({nodes: levelNodes, color: levelData.color});
            });

            for(let i=0; i<nodesByLevel.length - 1; i++) {
                const upperLevel = nodesByLevel[i];
                const lowerLevel = nodesByLevel[i+1];
                upperLevel.nodes.forEach(upperNode => {
                    const targetCount = 1 + Math.floor(Math.random()*2);
                    for(let k=0; k<targetCount; k++) {
                        const randomLowerNode = lowerLevel.nodes[Math.floor(Math.random() * lowerLevel.nodes.length)];
                        const lineMat = new THREE.LineBasicMaterial({color: upperLevel.color, transparent: true, opacity: 0.4});
                        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([upperNode.position, randomLowerNode.position]), lineMat));
                    }
                });
            }

            scene.add(group);
            animatedObjects['layered_network'] = group;
        }

        function buildBlackoutEngine() {
            // Ch. X — Grid stress visualization representing the blackout prediction engine
            // Visual concept: Tunisia's grid as a central power core surrounded by
            // demand pressure rings that compress inward as stress increases.
            // On Aug 14 2024: demand 4,888 MW crushed through the 4,636 MW capacity ring.

            const group = new THREE.Group();
            group.position.set(-80, 0, -110);

            // ── Core: the grid capacity sphere (4,636 MW effective) ──────────────
            const coreGeo = new THREE.SphereGeometry(3.5, 32, 32);
            const coreMat = new THREE.MeshStandardMaterial({
                color: 0x06b6d4, emissive: 0x06b6d4, emissiveIntensity: 0.4,
                transparent: true, opacity: 0.15, wireframe: false
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            group.add(core);

            // Wireframe overlay on core
            const coreWire = new THREE.Mesh(coreGeo,
                new THREE.MeshBasicMaterial({ color: 0x06b6d4, wireframe: true, transparent: true, opacity: 0.3 })
            );
            group.add(coreWire);

            // Inner energy glow
            const innerGlow = new THREE.Mesh(
                new THREE.SphereGeometry(2.2, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.25 })
            );
            group.add(innerGlow);

            // ── Capacity ring: 4,636 MW boundary ─────────────────────────────────
            const capacityRing = new THREE.Mesh(
                new THREE.TorusGeometry(5.5, 0.08, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.8 })
            );
            capacityRing.rotation.x = Math.PI / 2;
            group.add(capacityRing);

            // Capacity ring label sphere (green = safe boundary)
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.12, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0x00ff88 })
                );
                dot.position.set(Math.cos(angle) * 5.5, 0, Math.sin(angle) * 5.5);
                group.add(dot);
            }

            // ── Demand pressure rings — 4 risk tiers closing inward ───────────────
            // NOMINAL ring (far out — safe)
            const nominalRing = new THREE.Mesh(
                new THREE.TorusGeometry(8, 0.06, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.3, transparent: true, opacity: 0.5 })
            );
            nominalRing.rotation.x = Math.PI / 2;
            group.add(nominalRing);

            // ELEVATED ring
            const elevatedRing = new THREE.Mesh(
                new THREE.TorusGeometry(6.8, 0.07, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0xd4e000, emissive: 0xd4e000, emissiveIntensity: 0.5, transparent: true, opacity: 0.6 })
            );
            elevatedRing.rotation.x = Math.PI / 2;
            group.add(elevatedRing);

            // HIGH ring
            const highRing = new THREE.Mesh(
                new THREE.TorusGeometry(5.9, 0.08, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff8800, emissiveIntensity: 0.6, transparent: true, opacity: 0.7 })
            );
            highRing.rotation.x = Math.PI / 2;
            group.add(highRing);

            // CRITICAL ring — Aug 14 2024 event ring — BREACHED the capacity boundary
            const criticalRing = new THREE.Mesh(
                new THREE.TorusGeometry(5.3, 0.12, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff3333, emissiveIntensity: 1.0 })
            );
            criticalRing.rotation.x = Math.PI / 2;
            group.add(criticalRing);

            // ── Demand spike arrows — pointing inward from 4 cardinal directions ──
            const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.6 });
            const arrowPositions = [
                [8, 0, 0], [-8, 0, 0], [0, 0, 8], [0, 0, -8]
            ];
            arrowPositions.forEach(([x, y, z]) => {
                const arrow = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1.2, 8), arrowMat);
                arrow.position.set(x, y, z);
                // Point toward center
                arrow.lookAt(0, 0, 0);
                arrow.rotateX(Math.PI / 2);
                group.add(arrow);
            });

            // ── Algeria interconnector line — the lifeline ────────────────────────
            // Shown as a glowing line coming from outside the critical ring
            const algeriaPoints = [
                new THREE.Vector3(-14, 0, -3),
                new THREE.Vector3(-5.5, 0, 0)
            ];
            const algeriaLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(algeriaPoints),
                new THREE.LineBasicMaterial({ color: 0xfbbf24, linewidth: 2 })
            );
            group.add(algeriaLine);

            // Algeria source node
            const algeriaDot = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xfbbf24, emissive: 0xfbbf24, emissiveIntensity: 1.0 })
            );
            algeriaDot.position.set(-14, 0, -3);
            group.add(algeriaDot);

            // ── Blackout probability particles — red storm around the core ────────
            const particleCount = 200;
            const particleGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i += 3) {
                const radius = 4.5 + Math.random() * 2;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i]     = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta) * 0.3; // flatten to equatorial
                positions[i + 2] = radius * Math.cos(phi);
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particles = new THREE.Points(
                particleGeo,
                new THREE.PointsMaterial({ color: 0xff3333, size: 0.15, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending })
            );
            group.add(particles);

            scene.add(group);
            animatedObjects['blackout_engine'] = {
                group, core, coreWire, innerGlow,
                capacityRing, criticalRing, highRing, elevatedRing, nominalRing,
                particles, algeriaDot
            };
        }

        // --- 4. Interactions & UI Logic ---
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            if(presentationData[currentSlideIndex].interactiveGraph) checkIntersections(event.clientX, event.clientY);
            else document.getElementById('tooltip').style.opacity = 0;
        }

        function checkIntersections(clientX, clientY) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(chartBars);
            const tooltip = document.getElementById('tooltip');

            chartBars.forEach(bar => bar.material.emissive.setHex(0x000000));
            if (intersects.length > 0) {
                const object = intersects[0].object;
                object.material.emissive.setHex(object.userData.originalColor);
                object.material.emissiveIntensity = 0.6;
                document.getElementById('tt-title').innerText = object.userData.label;
                document.getElementById('tt-value').innerText = object.userData.value + " MW";
                tooltip.style.left = clientX + 'px';
                tooltip.style.top = clientY + 'px';
                tooltip.style.opacity = 1;
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.style.opacity = 0;
                document.body.style.cursor = 'default';
            }
        }

        function updateLabels() {
            if(!showLabelsState) {
                document.querySelectorAll('.location-label').forEach(el => el.style.opacity = 0);
                return;
            }
            for (const [key, mesh] of Object.entries(labelPoints)) {
                if(!mesh) continue;
                const vector = new THREE.Vector3();
                mesh.getWorldPosition(vector);
                vector.project(camera);
                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (vector.y * -.5 + .5) * window.innerHeight;
                const labelElement = document.getElementById(`label-${key}`);
                
                if (vector.z > 1) { labelElement.style.opacity = 0; } 
                else {
                    labelElement.style.opacity = 1;
                    labelElement.style.left = x + 'px';
                    labelElement.style.top = (y - (key === 'wind' ? 120 : 80)) + 'px'; 
                }
            }
        }

        function setupUIControls() {
            document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));
            document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
            
            document.getElementById('btn-start').addEventListener('click', () => {
                document.getElementById('start-overlay').style.opacity = 0;
                setTimeout(() => document.getElementById('start-overlay').remove(), 1000);
                createProgressDots();
                const initData = presentationData[0];
                document.getElementById('slide-subtitle').innerText = initData.subtitle;
                document.getElementById('slide-title').innerText = initData.title;
                document.getElementById('slide-body').innerHTML = initData.body;
                updateUIState();
            });
        }

        function createProgressDots() {
            const container = document.getElementById('progress-dots');
            presentationData.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `w-1.5 h-1.5 md:w-2 md:h-2 rounded-full transition-all duration-300 ${i === 0 ? 'bg-cyan-400 scale-125 shadow-[0_0_8px_#06b6d4]' : 'bg-gray-700'}`;
                dot.id = `dot-${i}`;
                container.appendChild(dot);
            });
        }

        function changeSlide(direction) {
            const newIndex = currentSlideIndex + direction;
            if(newIndex < 0 || newIndex >= presentationData.length) return;

            const container = document.getElementById('slide-container');
            container.classList.add('fade-out');
            
            document.getElementById('tooltip').style.opacity = 0;
            document.body.style.cursor = 'default';
            showLabelsState = false; 

            currentSlideIndex = newIndex;
            const slideData = presentationData[currentSlideIndex];
            
            targetCameraPos.set(slideData.camPos.x, slideData.camPos.y, slideData.camPos.z);
            targetLookAtPos.set(slideData.lookAt.x, slideData.lookAt.y, slideData.lookAt.z);

            if(slideData.triggerBlackout) {
                cityBlackoutStartTime = clock.getElapsedTime() + 1.5; 
            } else if (animatedObjects['city_grid']) {
                animatedObjects['city_grid'].buildings.forEach(b => {
                    b.material[0].emissiveIntensity = b.userData.originalEmissive;
                    b.material[1].emissiveIntensity = b.userData.originalEmissive;
                    b.material[4].emissiveIntensity = b.userData.originalEmissive;
                    b.material[5].emissiveIntensity = b.userData.originalEmissive;
                });
            }

            setTimeout(() => {
                document.getElementById('slide-subtitle').innerText = slideData.subtitle;
                document.getElementById('slide-title').innerText = slideData.title;
                document.getElementById('slide-body').innerHTML = slideData.body;
                document.getElementById('slide-counter').innerText = slideData.chapter;
                showLabelsState = slideData.showLabels;
                updateUIState();
                
                document.getElementById('story-panel').scrollTop = 0;
                container.classList.remove('fade-out');
            }, 600); 
        }

        function updateUIState() {
            document.getElementById('btn-prev').disabled = currentSlideIndex === 0;
            const btnNext = document.getElementById('btn-next');
            
            // Hide the next button completely on the last slide
            if (currentSlideIndex === presentationData.length - 1) {
                btnNext.style.display = 'none';
            } else {
                btnNext.style.display = 'flex';
                document.getElementById('next-text').innerText = 'Next Chapter';
            }

            presentationData.forEach((_, i) => {
                const dot = document.getElementById(`dot-${i}`);
                if(dot) {
                    dot.className = i === currentSlideIndex 
                        ? "w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-cyan-400 scale-125 transition-all duration-300 shadow-[0_0_8px_#06b6d4]" 
                        : "w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-gray-700 transition-all duration-300";
                }
            });
        }

        // --- 5. Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            camera.position.lerp(targetCameraPos, 0.03);
            currentLookAtPos.lerp(targetLookAtPos, 0.03);
            camera.lookAt(currentLookAtPos);

            if(animatedObjects['ambition']) {
                animatedObjects['ambition'].rotation.y = time * 0.3;
                animatedObjects['ambition'].rotation.x = time * 0.1;
            }
            if(animatedObjects['solar']) animatedObjects['solar'].rotation.y += 0.005;
            if(animatedObjects['wind_base']) animatedObjects['wind_base'].rotation.y += 0.005;
            if(animatedObjects['wind_rotor']) animatedObjects['wind_rotor'].rotation.z -= 0.03;
            if(animatedObjects['hydro']) animatedObjects['hydro'].rotation.y -= 0.005;

            if(animatedObjects['city_grid'] && presentationData[currentSlideIndex].triggerBlackout) {
                animatedObjects['city_grid'].group.rotation.y = Math.sin(time * 0.1) * 0.05;
                animatedObjects['city_grid'].buildings.forEach((b) => {
                    if(time > cityBlackoutStartTime + b.userData.delay) {
                        const currentInt = b.material[0].emissiveIntensity; 
                        if (currentInt > 0.01) {
                            const newInt = THREE.MathUtils.lerp(currentInt, 0, 0.1);
                            b.material[0].emissiveIntensity = newInt;
                            b.material[1].emissiveIntensity = newInt;
                            b.material[4].emissiveIntensity = newInt;
                            b.material[5].emissiveIntensity = newInt;
                        }
                    }
                });
            }

            if(animatedObjects['the_call']) {
                animatedObjects['the_call'].position.y = Math.sin(time * 2.5) * 0.02;
                animatedObjects['the_call'].children[0].rotation.x = Math.sin(time * 1.5) * 0.03; 
            }
            if(animatedObjects['graph']) animatedObjects['graph'].rotation.y = Math.sin(time * 0.2) * 0.05;
            if(animatedObjects['noorgrid']) {
                animatedObjects['noorgrid'].rotation.y = time * 0.1;
                animatedObjects['noorgrid'].rotation.x = Math.sin(time*0.5)*0.1;
                animatedObjects['noorgrid'].children[0].rotation.y = -time * 0.5;
            }
            if(animatedObjects['layers']) {
                animatedObjects['layers'].children[0].rotation.z = time * 0.5;
                animatedObjects['layers'].children[1].rotation.z = -time * 0.3;
                animatedObjects['layers'].children[2].rotation.z = time * 0.4;
            }
            if(animatedObjects['layered_network']) {
                animatedObjects['layered_network'].rotation.y = time * 0.05;
                animatedObjects['layered_network'].children.forEach(child => {
                    if(child instanceof THREE.Mesh) {
                        const s = 1 + Math.sin(time*2 + child.position.x)*0.1;
                        child.scale.set(s,s,s);
                    }
                });
            }
            if(animatedObjects['science']) {
                animatedObjects['science'].children[0].rotation.y = time * 0.1;
                animatedObjects['science'].children[0].rotation.x = time * 0.05;
                const scale = 1 + Math.sin(time*2)*0.05;
                animatedObjects['science'].scale.set(scale, scale, scale);
            }
            if(animatedObjects['roadmap']) animatedObjects['roadmap'].rotation.y = Math.sin(time * 0.3) * 0.2;

            // --- Blackout Engine Animation (Ch. X) ---
            if(animatedObjects['blackout_engine']) {
                const be = animatedObjects['blackout_engine'];

                // Core pulses — breathing like a stressed power grid
                const pulse = 1 + Math.sin(time * 2.5) * 0.08;
                be.core.scale.set(pulse, pulse, pulse);
                be.innerGlow.scale.set(pulse * 1.1, pulse * 1.1, pulse * 1.1);

                // Emissive intensity spikes on the pulse peak — grid voltage fluctuation
                be.core.material.emissiveIntensity = 0.3 + Math.sin(time * 2.5) * 0.2;

                // Critical ring rotates fast — danger signal
                be.criticalRing.rotation.z = time * 0.8;
                // Critical ring pulses red — blink effect
                be.criticalRing.material.emissiveIntensity = 0.8 + Math.sin(time * 4) * 0.5;

                // High ring rotates slower
                be.highRing.rotation.z = -time * 0.4;

                // Elevated ring drifts
                be.elevatedRing.rotation.z = time * 0.2;

                // Capacity ring (green boundary) holds steady — it's the limit
                be.capacityRing.rotation.z = time * 0.05;
                be.capacityRing.material.emissiveIntensity = 0.6 + Math.sin(time * 1.5) * 0.2;

                // Demand particles orbit the core like pressure closing in
                be.particles.rotation.y = time * 0.15;
                be.particles.rotation.x = Math.sin(time * 0.3) * 0.1;

                // Algeria dot pulses amber — the lifeline
                be.algeriaDot.material.emissiveIntensity = 0.7 + Math.sin(time * 3) * 0.4;
                be.algeriaDot.scale.setScalar(1 + Math.sin(time * 3) * 0.3);

                // Entire group slow drift — like a live monitoring screen
                be.group.rotation.y = Math.sin(time * 0.1) * 0.08;
            }
            if(animatedObjects['map'] && animatedObjects['mapNodes']) {
                animatedObjects['map'].rotation.y = Math.sin(time * 0.2) * 0.1;
                animatedObjects['mapNodes'].forEach((node, i) => {
                    const s = 1 + Math.sin(time*3 + i)*0.3;
                    node.children[0].scale.set(s,s,s);
                    node.children[0].material.opacity = 0.8 - (s-1)*2;
                });
            }
            
            // --- QR Code Portal Animation ---
            if(animatedObjects['qrportal']) {
                animatedObjects['qrportal'].group.position.y = 5 + Math.sin(time * 2) * 1.5; 
                animatedObjects['qrportal'].ring.rotation.z = time * 0.5;
            }

            // --- Sources orbs animation ---
            if(animatedObjects['sources']) {
                animatedObjects['sources'].rotation.y = time * 0.08;
                animatedObjects['sources'].children.forEach((child, i) => {
                    if(child.isMesh) {
                        child.position.y += Math.sin(time * 1.5 + i) * 0.005;
                    }
                });
            }

            updateLabels(); 
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = function () {
            initThreeJS();
            setupUIControls();
            animate();
        };
    </script>
</body>
</html>
